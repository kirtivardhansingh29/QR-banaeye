  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: hsl(220, 20%, 7%);
      --fg: hsl(210, 20%, 92%);
      --card: hsl(220, 18%, 10%);
      --primary: hsl(160, 84%, 50%);
      --primary-fg: hsl(220, 20%, 7%);
      --accent: hsl(190, 70%, 50%);
      --muted: hsl(220, 14%, 14%);
      --muted-fg: hsl(215, 12%, 50%);
      --border: hsl(220, 14%, 18%);
      --surface-grad: linear-gradient(145deg, hsl(220, 18%, 12%), hsl(220, 18%, 8%));
      --glow: 0 0 20px hsla(160, 84%, 50%, 0.3);
      --radius: 0.75rem;
      --error: hsl(0, 72%, 51%);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    code, .mono { font-family: 'JetBrains Mono', monospace; }

    .wrapper { width: 100%; max-width: 56rem; }

    /* Header */
    header { text-align: center; margin-bottom: 2.5rem; }
    .header-icon {
      display: inline-flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;
    }
    .icon-box {
      padding: 0.625rem; border-radius: 0.75rem;
      background: hsla(160, 84%, 50%, 0.1);
      border: 1px solid hsla(160, 84%, 50%, 0.2);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-box svg { width: 28px; height: 28px; color: var(--primary); }
    header h1 { font-size: clamp(1.875rem, 4vw, 2.25rem); font-weight: 700; letter-spacing: -0.025em; }
    .text-gradient {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted-fg); font-size: 0.875rem; max-width: 28rem; margin: 0 auto; }

    /* Grid */
    .grid {
      display: grid; grid-template-columns: 1fr; gap: 2rem; align-items: start;
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .panel-controls { order: 1; }
      .panel-display { order: 2; }
    }

    .panel {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 1rem; padding: 1.5rem;
    }
    .panel-title {
      font-size: 0.75rem; font-weight: 600; color: var(--muted-fg);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1.25rem;
    }

    /* Controls */
    .field { margin-bottom: 1.5rem; }
    .field:last-child { margin-bottom: 0; }
    .label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--fg);
    }
    .label svg { width: 16px; height: 16px; color: var(--primary); }
    .label svg.accent-icon { color: var(--accent); }

    input[type="text"], input[type="url"] {
      width: 100%; padding: 0.625rem 0.75rem;
      background: var(--muted); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--fg);
      font-family: 'JetBrains Mono', monospace; font-size: 0.875rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]::placeholder, input[type="url"]::placeholder { color: var(--muted-fg); }
    input[type="text"]:focus, input[type="url"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px hsla(160, 84%, 50%, 0.15);
    }
    .input-error { border-color: var(--error) !important; }
    .error-msg {
      font-size: 0.75rem; color: var(--error); margin-top: 0.25rem;
      display: none;
    }
    .error-msg.visible { display: block; }
    .char-count {
      font-family: 'JetBrains Mono', monospace; font-size: 0.675rem;
      color: var(--muted-fg); text-align: right; margin-top: 0.25rem;
    }
    .char-count.warn { color: var(--error); }

    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .color-picker {
      display: flex; align-items: center; gap: 0.75rem; margin-top: 0.25rem;
    }
    input[type="color"] {
      width: 2.5rem; height: 2.5rem; border-radius: 0.5rem;
      border: 1px solid var(--border); cursor: pointer;
      background: transparent; padding: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    input[type="color"]::-webkit-color-swatch { border-radius: 4px; border: none; }
    .color-hex { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted-fg); text-transform: uppercase; }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: 0.5rem;
      padding: 1rem; text-align: center; cursor: pointer;
      transition: border-color 0.2s; font-size: 0.875rem; color: var(--muted-fg);
    }
    .upload-zone:hover { border-color: hsla(160, 84%, 50%, 0.5); }
    .upload-zone img { width: 2.5rem; height: 2.5rem; border-radius: 0.25rem; object-fit: contain; }
    .upload-preview { display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
    #fileInput { display: none; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.625rem 1rem; border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
      gap: 0.5rem;

    .btn svg { width: 18px; height: 18px; }
    .btn-primary {
      background: var(--primary); color: var(--primary-fg);
      box-shadow: var(--glow);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline {
      background: transparent; color: var(--fg);
      border-color: var(--border);
    }
    .btn-outline:hover { border-color: hsla(160, 84%, 50%, 0.5); }
    .btn-reset {
      width: 100%; background: transparent; color: var(--muted-fg);
      border-color: var(--border);
    }
    .btn-reset:hover { color: var(--fg); border-color: hsla(160, 84%, 50%, 0.5); }

    /* Display */
    .qr-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
    }
    .qr-surface {
      background: var(--surface-grad); border-radius: 1rem;
      padding: 2rem; border: 1px solid var(--border);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 15px hsla(160, 84%, 50%, 0.2); }
      50% { box-shadow: 0 0 30px hsla(160, 84%, 50%, 0.4); }
    }
    .qr-canvas-wrap { border-radius: 0.75rem; overflow: hidden; line-height: 0; }
    .actions { display: flex; gap: 0.75rem; width: 100%; }
    .actions .btn { flex: 1; }
    .info {
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      color: var(--muted-fg); text-align: center;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1.25rem;
      color: var(--fg); font-size: 0.875rem; font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transform: translateY(120%); opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast-desc { font-size: 0.75rem; color: var(--muted-fg); margin-top: 0.125rem; }
  </style>
</head>

<script>
  'use strict';

  const DEFAULTS = Object.freeze({ url: 'https://lovable.dev', fg: '#00e68a', bg: '#111827' });
  const MAX_INPUT_LENGTH = 2048;
  const MAX_FILE_SIZE = 2 * 1024 * 1024; // 2MB
  const ALLOWED_MIME_TYPES = ['image/png', 'image/jpeg', 'image/gif', 'image/svg+xml', 'image/webp'];

  let logoImg = null;
  let logoUrl = null;
  let debounceTimer = null;

  const $ = id => document.getElementById(id);

  // --- Security: Input sanitization ---
  function sanitizeText(str) {
    if (typeof str !== 'string') return '';
    return str.trim().slice(0, MAX_INPUT_LENGTH);
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function isValidHexColor(hex) {
    return /^#[0-9A-Fa-f]{6}$/.test(hex);
  }

  function validateInput(value) {
    const errorEl = $('urlError');
    const inputEl = $('urlInput');

    if (!value || value.length === 0) {
      errorEl.textContent = 'Please enter a URL or text.';
      errorEl.classList.add('visible');
      inputEl.classList.add('input-error');
      return false;
    }
    if (value.length > MAX_INPUT_LENGTH) {
      errorEl.textContent = 'Input exceeds maximum length of ' + MAX_INPUT_LENGTH + ' characters.';
      errorEl.classList.add('visible');
      inputEl.classList.add('input-error');
      return false;
    }
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
    inputEl.classList.remove('input-error');
    return true;
  }

  function updateCharCount(value) {
    const countEl = $('urlCharCount');
    const len = value.length;
    countEl.textContent = len + ' / ' + MAX_INPUT_LENGTH;
    countEl.classList.toggle('warn', len > MAX_INPUT_LENGTH * 0.9);
  }

  // --- Security: File validation ---
  function validateFile(file) {
    const errorEl = $('fileError');
    if (!file) return false;

    if (!ALLOWED_MIME_TYPES.includes(file.type)) {
      errorEl.textContent = 'Invalid file type. Use PNG, JPEG, GIF, SVG, or WebP.';
      errorEl.classList.add('visible');
      return false;
    }
    if (file.size > MAX_FILE_SIZE) {
      errorEl.textContent = 'File too large. Maximum size is 2MB.';
      errorEl.classList.add('visible');
      return false;
    }
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
    return true;
  }

  // --- Toast ---
  function showToast(title, desc) {
    $('toastTitle').textContent = title;
    $('toastDesc').textContent = desc;
    $('toast').classList.add('show');
    setTimeout(() => $('toast').classList.remove('show'), 2500);
  }

  // --- QR Generation (debounced) ---
  function generateQR() {
    const raw = $('urlInput').value;
    const url = sanitizeText(raw);
    if (!validateInput(url)) return;
    updateCharCount(url);

    const fg = $('fgColor').value;
    const bg = $('bgColor').value;
    if (!isValidHexColor(fg) || !isValidHexColor(bg)) return;

    const canvas = $('qrCanvas');

    QRCode.toCanvas(canvas, url, {
      width: 240,
      margin: 1,
      color: { dark: fg, light: bg },
      errorCorrectionLevel: 'H'
    }, function(err) {
      if (err) return;
      if (logoImg) drawLogo(canvas);
    });
  }

  function debouncedGenerate() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(generateQR, 150);
  }

  function drawLogo(canvas) {
    const ctx = canvas.getContext('2d');
    const size = 40;
    const x = (canvas.width - size) / 2;
    const y = (canvas.height - size) / 2;
    const bg = $('bgColor').value;
    if (!isValidHexColor(bg)) return;
    ctx.fillStyle = bg;
    ctx.fillRect(x - 4, y - 4, size + 8, size + 8);
    ctx.drawImage(logoImg, x, y, size, size);
  }

  // --- Event Listeners ---
  $('urlInput').addEventListener('input', function() {
    updateCharCount(this.value);
    debouncedGenerate();
  });
  $('fgColor').addEventListener('input', function(e) {
    if (!isValidHexColor(e.target.value)) return;
    $('fgHex').textContent = e.target.value;
    generateQR();
  });
  $('bgColor').addEventListener('input', function(e) {
    if (!isValidHexColor(e.target.value)) return;
    $('bgHex').textContent = e.target.value;
    generateQR();
  });

  $('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file || !validateFile(file)) return;

    if (logoUrl) URL.revokeObjectURL(logoUrl);
    logoUrl = URL.createObjectURL(file);
    logoImg = new Image();
    logoImg.onload = function() {
      // Security: Build DOM safely instead of innerHTML
      const zone = $('uploadZone');
      zone.textContent = '';
      const wrapper = document.createElement('div');
      wrapper.className = 'upload-preview';
      const img = document.createElement('img');
      img.src = logoUrl;
      img.alt = 'Uploaded logo preview';
      img.width = 40;
      img.height = 40;
      const span = document.createElement('span');
      span.textContent = 'Click to change';
      wrapper.appendChild(img);
      wrapper.appendChild(span);
      zone.appendChild(wrapper);
      generateQR();
    };
    logoImg.onerror = function() {
      showToast('Error', 'Failed to load image.');
      if (logoUrl) URL.revokeObjectURL(logoUrl);
      logoImg = null;
      logoUrl = null;
    };
    logoImg.src = logoUrl;
  });

  function resetDefaults() {
    $('urlInput').value = DEFAULTS.url;
    $('fgColor').value = DEFAULTS.fg;
    $('bgColor').value = DEFAULTS.bg;
    $('fgHex').textContent = DEFAULTS.fg;
    $('bgHex').textContent = DEFAULTS.bg;
    if (logoUrl) URL.revokeObjectURL(logoUrl);
    logoImg = null; logoUrl = null;
    $('uploadZone').textContent = '';
    const span = document.createElement('span');
    span.textContent = 'Click to upload a logo';
    $('uploadZone').appendChild(span);
    $('fileInput').value = '';
    $('urlError').classList.remove('visible');
    $('urlInput').classList.remove('input-error');
    $('fileError').classList.remove('visible');
    updateCharCount(DEFAULTS.url);
    generateQR();
  }

  function downloadQR() {
    const canvas = $('qrCanvas');
    const link = document.createElement('a');
    link.download = 'qr-code.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Downloaded!', 'QR code saved as PNG.');
  }

  async function copyQR() {
    const canvas = $('qrCanvas');
    try {
      const blob = await new Promise(function(resolve) { canvas.toBlob(resolve, 'image/png'); });
      if (blob) {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        $('copyText').textContent = 'Copied!';
        showToast('Copied!', 'QR code copied to clipboard.');
        setTimeout(function() { $('copyText').textContent = 'Copy'; }, 2000);
      }
    } catch (err) {
      showToast('Error', 'Could not copy to clipboard.');
    }
  }

  // Initial render
  updateCharCount($('urlInput').value);
  generateQR();
</script>

</body>
</html>
